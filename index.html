<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MakeDecisions · 你给一个主题，AI 带你活一遍</title>
<style>
  :root {
    --bg: #0f0f14;
    --panel: #181822;
    --panel-2: #20202c;
    --text: #e8e8ee;
    --text-dim: #9a9aae;
    --accent: #c8a96a;
    --accent-hover: #e0bf7c;
    --danger: #d97070;
    --border: #2a2a38;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.75;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  h1 {
    font-size: 28px;
    margin: 0 0 6px;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: 1px;
  }

  /* 主题输入页 */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 16px;
  }
  .input-area label {
    display: block;
    color: var(--text-dim);
    margin-bottom: 10px;
    font-size: 14px;
  }
  textarea {
    width: 100%;
    min-height: 90px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    font-size: 16px;
    font-family: inherit;
    resize: vertical;
    outline: none;
    transition: border-color .15s;
  }
  textarea:focus { border-color: var(--accent); }
  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .chip {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
  }
  .chip:hover { color: var(--accent); border-color: var(--accent); }
  .btn {
    display: inline-block;
    background: var(--accent);
    color: #1a1a22;
    border: none;
    padding: 12px 24px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    font-family: inherit;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }
  .actions { margin-top: 18px; display: flex; gap: 10px; align-items: center; }

  /* 叙事页 */
  .scene-meta {
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 1px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  /* 场景图 */
  .scene-image-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #1a1a24, #25252e);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 18px;
    position: relative;
    display: none;
    border: 1px solid var(--border);
  }
  .scene-image-wrap.show { display: block; }
  .scene-image-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity .8s ease;
  }
  .scene-image-wrap img.loaded { opacity: 1; }
  .scene-image-wrap .img-loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 1px;
  }
  .scene-image-wrap .img-loading::after {
    content: '';
    width: 18px; height: 18px;
    border: 2px solid var(--text-dim);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin-left: 10px;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .scene-image-wrap .img-loading.hidden { display: none; }
  .narrative {
    font-size: 17px;
    color: var(--text);
    margin: 0 0 28px;
    white-space: pre-wrap;
    min-height: 60px;
  }
  .cursor {
    display: inline-block;
    width: 8px;
    height: 18px;
    background: var(--accent);
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 18px;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    font-size: 15px;
    font-family: inherit;
    transition: all .15s;
    line-height: 1.5;
  }
  .choice:hover {
    border-color: var(--accent);
    background: #25252e;
    transform: translateX(4px);
  }
  .choice:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .choice .hint {
    display: inline-block;
    margin-left: 8px;
    font-size: 12px;
    color: var(--accent);
    opacity: .7;
  }

  /* 自由输入框 */
  .free-action {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
  }
  .free-action-label {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 8px;
    font-style: italic;
  }
  .free-action-row { display: flex; gap: 8px; }
  .free-action input {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  .free-action input:focus { border-color: var(--accent); }
  .free-action button {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 0 18px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    transition: all .15s;
  }
  .free-action button:hover { background: var(--accent); color: #1a1a22; }
  .free-action button:disabled { opacity: .4; cursor: not-allowed; }

  /* 底部操作栏 */
  .game-footer {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 16px;
  }
  .game-footer .btn { padding: 8px 16px; font-size: 13px; }

  /* 状态条 */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    background: var(--panel-2);
    border-radius: 6px;
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .status-bar .turn { color: var(--accent); }

  /* 加载 / 错误 */
  .loading {
    text-align: center;
    color: var(--text-dim);
    padding: 30px;
    font-size: 14px;
  }
  .loading::after {
    content: '...';
    animation: dots 1.4s steps(4) infinite;
    display: inline-block;
    width: 0;
    overflow: hidden;
    vertical-align: bottom;
  }
  @keyframes dots {
    0% { width: 0; }
    100% { width: 1.5em; }
  }
  .error {
    background: rgba(217, 112, 112, 0.1);
    border: 1px solid var(--danger);
    color: var(--danger);
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 14px;
    margin-top: 12px;
  }

  /* 结局 */
  .ending h2 { color: var(--accent); margin-top: 0; }
  .history-list { margin-top: 18px; padding-left: 20px; color: var(--text-dim); }
  .history-list li { margin-bottom: 8px; font-size: 14px; }

  /* 设置抽屉 */
  .settings-trigger {
    position: fixed;
    top: 16px; right: 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
  }
  .settings-trigger:hover { color: var(--accent); }
  .settings-panel {
    display: none;
    position: fixed;
    top: 60px; right: 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    width: 340px;
    z-index: 10;
    max-height: 80vh;
    overflow-y: auto;
  }
  .settings-panel.show { display: block; }
  .settings-panel input[type="text"] {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 12px;
    margin-top: 6px;
  }
  .settings-panel small { color: var(--text-dim); display: block; margin-top: 8px; font-size: 12px; line-height: 1.5; }
  .settings-section {
    border-top: 1px solid var(--border);
    padding-top: 14px;
    margin-top: 14px;
  }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0;
    color: var(--text);
    font-size: 14px;
  }
  .settings-row select {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 13px;
  }
  /* iOS 风格 toggle */
  .toggle {
    position: relative;
    width: 38px; height: 22px;
    background: var(--panel-2);
    border-radius: 22px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background .2s;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: var(--text-dim);
    border-radius: 50%;
    transition: all .2s;
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle.on::after { left: 18px; background: #1a1a22; }
</style>
</head>
<body>

<button class="settings-trigger" onclick="toggleSettings()" title="设置">⚙</button>
<div class="settings-panel" id="settings-panel">
  <div style="font-weight:600; color:var(--text); margin-bottom:6px;">连接</div>
  <label style="color:var(--text-dim); font-size:13px;">调用模式</label>
  <div class="settings-row">
    <span>使用 Worker 后端</span>
    <div class="toggle" id="toggle-backend" onclick="toggleSetting('useBackend', this)"></div>
  </div>
  <small id="backend-hint" style="margin-top:0;">关：浏览器直连智谱（仅本地）。开：走 Worker 后端，可上线。</small>

  <div id="backend-config" style="margin-top:10px; display:none;">
    <label style="color:var(--text-dim); font-size:13px;">Worker 后端地址</label>
    <input type="text" id="backend-url-input" placeholder="https://make-decisions-api.<your>.workers.dev" />
  </div>
  <div id="direct-config">
    <label style="color:var(--text-dim); font-size:13px;">智谱 GLM API Key（直连模式）</label>
    <input type="text" id="api-key-input" placeholder="粘贴你的 API Key" />
  </div>

  <div class="settings-section">
    <div style="font-weight:600; margin-bottom:6px;">体验增强</div>
    <div class="settings-row">
      <span>场景配图（CogView）</span>
      <div class="toggle" id="toggle-image" onclick="toggleSetting('imageEnabled', this)"></div>
    </div>
    <div class="settings-row">
      <span>环境音 / 氛围音效</span>
      <div class="toggle" id="toggle-audio" onclick="toggleSetting('audioEnabled', this)"></div>
    </div>
    <div class="settings-row">
      <span>画风</span>
      <select id="art-style-select" onchange="onArtStyleChange()">
        <option value="cinematic">电影感（默认）</option>
        <option value="ink">水墨写意</option>
        <option value="anime">动漫插画</option>
        <option value="oil">油画质感</option>
        <option value="pixel">像素风</option>
      </select>
    </div>
    <small>配图与音效会让节奏放慢，视网络可能多 2-5 秒；可随时关掉。</small>
  </div>

  <div class="settings-section">
    <button class="btn" style="padding:6px 14px; font-size:13px;" onclick="saveSettings()">保存设置</button>
    <button class="btn btn-ghost" style="padding:6px 14px; font-size:13px;" onclick="clearGame()">清空存档</button>
  </div>
</div>

<div class="container">
  <header>
    <h1>Make Decisions</h1>
    <div class="subtitle">你给一个主题，AI 带你活一遍</div>
  </header>

  <!-- 主题输入 -->
  <div id="page-home" class="panel">
    <div class="input-area">
      <label>你想体验一段怎样的故事？（用一句话描述）</label>
      <textarea id="theme-input" placeholder="例如：晚清的一名江湖刺客，奉命刺杀一位即将远渡重洋的革命党人……"></textarea>
      <div class="examples">
        <span class="chip" onclick="setTheme('末日废土的赏金猎人，在沙暴中追查一名失踪的科学家')">末日废土赏金猎人</span>
        <span class="chip" onclick="setTheme('赛博朋克 2099 年的一名义体侦探，调查一桩 AI 自杀案')">赛博朋克侦探</span>
        <span class="chip" onclick="setTheme('修真界一个刚拜师的小弟子，发现师门竟是魔教伪装')">修真小弟子</span>
        <span class="chip" onclick="setTheme('一名穿越到三国的现代程序员，被刘备聘为军师')">三国穿越</span>
      </div>
      <div class="actions">
        <button class="btn" id="start-btn" onclick="startGame()">开始你的故事</button>
        <button class="btn btn-ghost" id="resume-btn" onclick="resumeGame()" style="display:none;">继续上次的故事</button>
      </div>
      <div id="home-error"></div>
    </div>
  </div>

  <!-- 叙事页 -->
  <div id="page-game" style="display:none;">
    <div class="status-bar">
      <span>主题：<span id="status-theme"></span></span>
      <span class="turn">第 <span id="status-turn">0</span> 回合</span>
    </div>
    <div class="panel">
      <div class="scene-meta" id="scene-meta">SCENE</div>
      <div class="scene-image-wrap" id="scene-image-wrap">
        <div class="img-loading" id="scene-image-loading">绘制中</div>
        <img id="scene-image" alt="" />
      </div>
      <div class="narrative" id="narrative"></div>
      <div class="choices" id="choices"></div>

      <div class="free-action" id="free-action-area">
        <div class="free-action-label">或者，做点别的……</div>
        <div class="free-action-row">
          <input type="text" id="free-action-input"
                 placeholder="输入你想做的事，比如：偷偷绕到屋后，从窗户看里面有什么"
                 maxlength="80"
                 onkeydown="if(event.key==='Enter') submitFreeAction()" />
          <button id="free-action-btn" onclick="submitFreeAction()">行动</button>
        </div>
      </div>

      <div id="game-error"></div>
    </div>
    <div class="actions game-footer">
      <button class="btn btn-ghost" onclick="endGameEarly()" title="不再继续，直接进入结局回顾页">放弃这个故事</button>
      <button class="btn" onclick="requestEnding()" title="让 AI 给这段故事一个收束">让故事在这里收尾</button>
    </div>
  </div>

  <!-- 结局页 -->
  <div id="page-ending" style="display:none;" class="panel ending">
    <h2>故事到这里。</h2>
    <div class="narrative" id="ending-narrative"></div>
    <h3 style="color:var(--text-dim); font-size:14px; letter-spacing:1px;">你的旅程 ——</h3>
    <ol class="history-list" id="ending-history"></ol>
    <div class="actions">
      <button class="btn" onclick="restart()">开始新的故事</button>
    </div>
  </div>
</div>

<script>
/* =========================================================
 *  MakeDecisions · 开放世界 AI 互动叙事 (单文件 MVP)
 * ========================================================= */

const STORAGE_KEY = 'makeDecisions.save.v1';
const SETTINGS_KEY = 'makeDecisions.settings.v1';
const ZHIPU_CHAT_ENDPOINT = 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
const ZHIPU_IMAGE_ENDPOINT = 'https://open.bigmodel.cn/api/paas/v4/images/generations';
const MAX_TURNS = 30;
const ENDING_HINT_TURN = 18;

// 默认 Key（已清空。本地试玩请在 ⚙ 设置里粘贴你自己的 Key；
//  上线请使用 Worker 后端模式，Key 由 Cloudflare secret 注入。）
const DEFAULT_API_KEY = '';

/* ---------- Settings ---------- */
const DEFAULT_SETTINGS = {
  useBackend: false,           // false = 浏览器直连智谱；true = 走 Worker
  backendUrl: '',              // 例如 https://make-decisions-api.xxx.workers.dev
  apiKey: '',                  // 直连模式下使用（空值 => DEFAULT_API_KEY）
  imageEnabled: false,         // 场景配图
  audioEnabled: false,         // 环境音
  artStyle: 'cinematic',       // 画风
};
function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return { ...DEFAULT_SETTINGS };
    return { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
  } catch { return { ...DEFAULT_SETTINGS }; }
}
function persistSettings() {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}
let settings = loadSettings();

/* 画风 → CogView prompt 后缀 */
const ART_STYLE_SUFFIX = {
  cinematic: 'cinematic lighting, photorealistic, dramatic atmosphere, ultra detailed, 16:9',
  ink: 'traditional chinese ink wash painting, monochrome, misty, sparse brush strokes',
  anime: 'high-quality anime illustration, soft shading, vivid colors, detailed background',
  oil: 'oil painting, thick brush strokes, classical, warm tones, masterpiece',
  pixel: '16-bit pixel art, retro game aesthetic, limited palette, sharp pixels',
};

let storyState = null;

/* ---------- 系统 Prompt ---------- */
function buildSystemPrompt() {
  return `你是一台"开放世界互动小说"叙事引擎。

【硬性规则 - 必须严格遵守】
1. 始终用第二人称"你"叙述，让玩家代入主角。
2. 每次输出必须是一个合法 JSON，不允许任何前后缀或解释文字。
3. narrative 字段控制在 150-300 个汉字，画面感强、留悬念。
4. choices 必须给 3-4 个截然不同方向的选项（动作差异、动机差异、风险差异），禁止"换汤不换药"。每个选项 8-25 字。每个选项的 hint 用 2-4 字标签（如"激进""谨慎""欺骗""好奇""善意""背叛"），帮玩家快速判断风格。
5. 必须基于"故事状态"保持连贯，不能凭空冒出未提及的人物、物品、情节。已经登场的人物名字、地点必须保留一致。
6. scene_summary 用一句不超过 30 字的话总结这一回合发生的关键事件，作为下一轮上下文。
7. state_updates 只在确实发生变化时填写；inventory_add/remove 是数组，relationship_changes 是对象。
8. 节奏控制：第 1-3 回合负责立人设、抛出钩子；第 4-${ENDING_HINT_TURN - 1} 回合是冲突与抉择高峰；第 ${ENDING_HINT_TURN} 回合起开始铺垫结局，回收伏笔；第 ${MAX_TURNS - 3} 回合起把故事推向结局。
9. 玩家可能不选预设选项，而是输入"自由行动"。当看到【玩家自由行动】时，要尊重玩家的创造力：合理的就让它发生（哪怕带来意外后果），不合理的（违反物理规律/世界观）就让世界给出真实回应（失败、被嘲笑、惊动他人等），不要简单驳回。
10. 当玩家发出【主动求结局】信号时，立即在本回合给出一个完整、有重量、回收伏笔的结局段落（300-450 字），把 ending_triggered 设为 true，choices 设为空数组。结局要呼应主角的核心选择，不要强行 happy ending。
11. 严禁色情、政治敏感、未成年性暗示等内容；遇到也将其文学化淡化处理。

【辅助字段（用于配图与音效，非常重要）】
- image_prompt：用 ENGLISH 写一段 30-60 词的视觉描述，专注当前场景的画面（地点、光线、人物姿态、关键道具、氛围、构图角度），不要包含对白、不要写英文解释。例如："a young female assassin in dark hanfu crouching on a moonlit tile rooftop, light rain, dramatic shadows, ancient chinese town in background, cinematic"。该字段每回合都必须给出。
- ambience：从下列固定列表中选 1 个最贴合当前场景氛围的英文标签：
  ["calm","tense","mysterious","ominous","battle","romantic","sad","triumphant","city","wild","indoor","supernatural"]
  该字段每回合都必须给出。

【输出 JSON Schema】
{
  "narrative": "string",
  "scene_summary": "string",
  "image_prompt": "string (English, 30-60 words)",
  "ambience": "calm|tense|mysterious|ominous|battle|romantic|sad|triumphant|city|wild|indoor|supernatural",
  "choices": [{"id":"A","text":"string","hint":"string"}, ...],
  "state_updates": {
    "inventory_add": ["string"],
    "inventory_remove": ["string"],
    "relationship_changes": {"角色名":"+1 信任 / -2 敌意"},
    "protagonist_init": {"name":"string","background":"string","traits":["string"]},
    "world_setting_init": "string",
    "ending_triggered": false
  }
}

【特殊说明】
- 第 1 回合：必须填写 protagonist_init 和 world_setting_init，初始化主角和世界观；narrative 是开场。
- 后续回合：protagonist_init 和 world_setting_init 留空 / 不填。`;
}

function buildTurnUserMessage(state, lastAction, actionMeta = {}) {
  const compactState = {
    theme: state.theme,
    protagonist: state.protagonist,
    worldSetting: state.worldSetting,
    inventory: state.inventory,
    relationships: state.relationships,
    history: state.history.slice(-8), // 仅保留最近 8 回合摘要
    turn: state.turn,
  };
  if (state.turn === 0) {
    return `【主题】${state.theme}\n\n这是第 1 回合。请生成开场，初始化主角与世界观。`;
  }
  let actionLine;
  if (actionMeta.endingRequested) {
    actionLine = `【主动求结局】玩家希望在此回合让故事收束。玩家最后的动作：${lastAction || '（无）'}`;
  } else if (actionMeta.freeAction) {
    actionLine = `【玩家自由行动】${lastAction}`;
  } else {
    actionLine = `【玩家上一选择】${lastAction}`;
  }
  return `【故事状态】\n${JSON.stringify(compactState, null, 2)}\n\n${actionLine}\n\n请生成第 ${state.turn + 1} 回合。`;
}

/* ---------- API 调用 ---------- */

// 文本回合：返回解析后的 result 对象
async function apiTurn(state, lastAction, actionMeta = {}) {
  const messages = [
    { role: 'system', content: buildSystemPrompt() },
    { role: 'user', content: buildTurnUserMessage(state, lastAction, actionMeta) },
  ];

  if (settings.useBackend) {
    const url = settings.backendUrl?.replace(/\/+$/, '');
    if (!url) throw new Error('已开启 Worker 模式但未填写后端地址。请在 ⚙ 设置里填。');
    const resp = await fetch(url + '/api/turn', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, temperature: 0.85 }),
    });
    const data = await safeJson(resp);
    if (!resp.ok || !data?.ok) throw new Error(data?.error || '后端错误 ' + resp.status);
    return data.result;
  }

  // 直连模式
  const apiKey = (settings.apiKey || '').trim() || DEFAULT_API_KEY;
  if (!apiKey) throw new Error('API Key 未配置，请点击右上角 ⚙ 设置。');
  const resp = await fetch(ZHIPU_CHAT_ENDPOINT, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey,
    },
    body: JSON.stringify({
      model: 'glm-4-flash',
      messages,
      temperature: 0.85,
      response_format: { type: 'json_object' },
    }),
  });
  if (!resp.ok) throw new Error('API 错误 ' + resp.status + '：' + (await resp.text()).slice(0, 200));
  const data = await resp.json();
  const content = data?.choices?.[0]?.message?.content;
  if (!content) throw new Error('API 没有返回内容');
  try { return JSON.parse(content); }
  catch {
    const m = content.match(/\{[\s\S]*\}/);
    if (m) return JSON.parse(m[0]);
    throw new Error('AI 返回的不是合法 JSON：' + content.slice(0, 200));
  }
}

// 场景配图：返回 imageUrl
async function apiImage(prompt) {
  const finalPrompt = enrichImagePrompt(prompt);
  if (settings.useBackend) {
    const url = settings.backendUrl?.replace(/\/+$/, '');
    if (!url) throw new Error('Worker 后端地址未配置');
    const resp = await fetch(url + '/api/image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: finalPrompt }),
    });
    const data = await safeJson(resp);
    if (!resp.ok || !data?.ok) throw new Error(data?.error || '图片生成失败');
    return data.url;
  }
  const apiKey = (settings.apiKey || '').trim() || DEFAULT_API_KEY;
  const resp = await fetch(ZHIPU_IMAGE_ENDPOINT, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey,
    },
    body: JSON.stringify({
      model: 'cogview-3-flash',
      prompt: finalPrompt,
      size: '1024x1024',
    }),
  });
  if (!resp.ok) throw new Error('图片 API 错误 ' + resp.status);
  const data = await resp.json();
  const u = data?.data?.[0]?.url;
  if (!u) throw new Error('图片未返回 URL');
  return u;
}

function enrichImagePrompt(prompt) {
  const suffix = ART_STYLE_SUFFIX[settings.artStyle] || ART_STYLE_SUFFIX.cinematic;
  return prompt + ', ' + suffix;
}

async function safeJson(resp) {
  try { return await resp.json(); } catch { return null; }
}

/* ---------- 状态合并 ---------- */
function applyTurnResult(state, result, actionText, actionMeta = {}) {
  const u = result.state_updates || {};
  if (state.turn === 0) {
    if (u.protagonist_init) state.protagonist = u.protagonist_init;
    if (u.world_setting_init) state.worldSetting = u.world_setting_init;
  }
  if (u.inventory_add) for (const item of u.inventory_add) {
    if (!state.inventory.includes(item)) state.inventory.push(item);
  }
  if (u.inventory_remove) state.inventory = state.inventory.filter(x => !u.inventory_remove.includes(x));
  if (u.relationship_changes) {
    for (const [name, change] of Object.entries(u.relationship_changes)) {
      state.relationships[name] = change;
    }
  }

  state.turn += 1;
  state.history.push({
    turn: state.turn,
    summary: result.scene_summary || '',
    choice: chooseLabel(actionText, actionMeta),
  });
  state.currentScene = result.narrative;
  state.lastChoices = result.choices || [];
  state.lastImagePrompt = result.image_prompt || '';
  state.lastAmbience = result.ambience || 'calm';
  state.lastImageUrl = '';   // 当回合的图片由 runTurn 异步生成后回填
  // 若用户求结局或 AI 自己判定结局，标记结束
  state.endingTriggered = !!u.ending_triggered || !!actionMeta.endingRequested;
  saveGame();
}

function chooseLabel(t, meta = {}) {
  if (!t) return '（开场）';
  let prefix = '';
  if (meta.freeAction) prefix = '✎ ';
  if (meta.endingRequested) prefix = '⏵ 求结局：';
  const text = t.length > 24 ? t.slice(0, 24) + '…' : t;
  return prefix + text;
}

/* ---------- 存档 ---------- */
function newState(theme) {
  return {
    theme,
    protagonist: null,
    worldSetting: '',
    inventory: [],
    relationships: {},
    history: [],
    currentScene: '',
    lastChoices: [],
    lastImagePrompt: '',
    lastAmbience: 'calm',
    lastImageUrl: '',
    turn: 0,
    endingTriggered: false,
  };
}
function saveGame() {
  if (storyState) localStorage.setItem(STORAGE_KEY, JSON.stringify(storyState));
}
function loadGame() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return null; }
}
function clearGame() {
  localStorage.removeItem(STORAGE_KEY);
  storyState = null;
  stopAmbience();
  hideSceneImage();
  toggleSettings();
  showHome();
}

/* ---------- Settings UI 绑定 ---------- */
function refreshSettingsUI() {
  document.getElementById('toggle-backend').classList.toggle('on', !!settings.useBackend);
  document.getElementById('toggle-image').classList.toggle('on', !!settings.imageEnabled);
  document.getElementById('toggle-audio').classList.toggle('on', !!settings.audioEnabled);
  document.getElementById('art-style-select').value = settings.artStyle || 'cinematic';
  document.getElementById('backend-config').style.display = settings.useBackend ? '' : 'none';
  document.getElementById('direct-config').style.display = settings.useBackend ? 'none' : '';
  document.getElementById('backend-url-input').value = settings.backendUrl || '';
  document.getElementById('api-key-input').value = settings.apiKey || '';
  document.getElementById('backend-hint').textContent = settings.useBackend
    ? '通过 Worker 后端调用，可上线分享给朋友。'
    : '关：浏览器直连智谱（仅本地）。开：走 Worker 后端，可上线。';
}

function toggleSetting(key, el) {
  settings[key] = !settings[key];
  el.classList.toggle('on', !!settings[key]);
  refreshSettingsUI();
}

function onArtStyleChange() {
  settings.artStyle = document.getElementById('art-style-select').value;
}

function saveSettings() {
  settings.backendUrl = document.getElementById('backend-url-input').value.trim();
  settings.apiKey = document.getElementById('api-key-input').value.trim();
  settings.artStyle = document.getElementById('art-style-select').value;
  persistSettings();
  toggleSettings();
}

function toggleSettings() {
  const p = document.getElementById('settings-panel');
  p.classList.toggle('show');
  if (p.classList.contains('show')) refreshSettingsUI();
}

/* ---------- UI 渲染 ---------- */
function showHome() {
  document.getElementById('page-home').style.display = '';
  document.getElementById('page-game').style.display = 'none';
  document.getElementById('page-ending').style.display = 'none';
  const saved = loadGame();
  document.getElementById('resume-btn').style.display = saved ? '' : 'none';
}

function setTheme(t) {
  document.getElementById('theme-input').value = t;
}

async function startGame() {
  const theme = document.getElementById('theme-input').value.trim();
  if (!theme) {
    showError('home-error', '请先输入或选择一个主题。');
    return;
  }
  storyState = newState(theme);
  showGamePage();
  document.getElementById('status-theme').textContent = theme.length > 24 ? theme.slice(0, 24) + '…' : theme;
  await runTurn('（开场）');
}

function resumeGame() {
  const saved = loadGame();
  if (!saved) return;
  storyState = saved;
  showGamePage();
  document.getElementById('status-theme').textContent =
    storyState.theme.length > 24 ? storyState.theme.slice(0, 24) + '…' : storyState.theme;
  document.getElementById('status-turn').textContent = storyState.turn;
  renderScene(storyState.currentScene, storyState.lastChoices, /*animate*/ false);
  // 恢复缓存的场景图（不重新生成，避免浪费）
  if (settings.imageEnabled && storyState.lastImageUrl) {
    const wrap = document.getElementById('scene-image-wrap');
    const img = document.getElementById('scene-image');
    const loading = document.getElementById('scene-image-loading');
    wrap.classList.add('show');
    loading.classList.add('hidden');
    img.onload = () => img.classList.add('loaded');
    img.src = storyState.lastImageUrl;
  }
  triggerAmbience(storyState.lastAmbience);
}

function showGamePage() {
  document.getElementById('page-home').style.display = 'none';
  document.getElementById('page-ending').style.display = 'none';
  document.getElementById('page-game').style.display = '';
  setFreeActionVisible(true);
}

function renderScene(text, choices, animate = true) {
  const narrEl = document.getElementById('narrative');
  const choicesEl = document.getElementById('choices');
  document.getElementById('scene-meta').textContent =
    storyState.endingTriggered ? 'ENDING' : 'SCENE ' + storyState.turn;
  document.getElementById('status-turn').textContent = storyState.turn;
  choicesEl.innerHTML = '';
  if (animate) {
    narrEl.innerHTML = '<span class="cursor"></span>';
    typewriter(narrEl, text, () => renderChoices(choices));
  } else {
    narrEl.textContent = text;
    renderChoices(choices);
  }
}

function renderChoices(choices) {
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  // 结局或 AI 没给选项 → 进入结局页
  if (storyState.endingTriggered || !choices || choices.length === 0) {
    setFreeActionVisible(false);
    setActionsDisabled(true);
    setTimeout(() => goToEnding(), 800);
    return;
  }
  setFreeActionVisible(true);
  setActionsDisabled(false);
  for (const c of choices) {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<strong>${c.id || '·'}</strong>　${escapeHtml(c.text)}` +
      (c.hint ? `<span class="hint">${escapeHtml(c.hint)}</span>` : '');
    btn.onclick = () => onChoose(c.text);
    choicesEl.appendChild(btn);
  }
}

function setFreeActionVisible(visible) {
  const a = document.getElementById('free-action-area');
  if (a) a.style.display = visible ? '' : 'none';
  const f = document.querySelector('.game-footer');
  if (f) f.style.display = visible ? '' : 'none';
}

function typewriter(el, text, done) {
  let i = 0;
  el.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  el.appendChild(cursor);
  const span = document.createElement('span');
  el.insertBefore(span, cursor);
  const tick = () => {
    if (i >= text.length) {
      cursor.remove();
      if (done) done();
      return;
    }
    span.textContent += text[i++];
    setTimeout(tick, 22);
  };
  tick();
}

async function onChoose(choiceText) {
  setActionsDisabled(true);
  await runTurn(choiceText, {});
}

async function submitFreeAction() {
  const input = document.getElementById('free-action-input');
  const v = input.value.trim();
  if (!v) {
    input.focus();
    return;
  }
  if (v.length < 2) {
    showError('game-error', '行动描述太短了，至少 2 个字。');
    return;
  }
  input.value = '';
  setActionsDisabled(true);
  await runTurn(v, { freeAction: true });
}

async function requestEnding() {
  if (!storyState) return;
  if (!confirm('确定要让 AI 在这一回合给故事一个收束吗？')) return;
  setActionsDisabled(true);
  // 把"上一动作"留空或用一个中性词，让 AI 直接收尾
  const lastAction = '（玩家在此停下，等待故事的归处）';
  await runTurn(lastAction, { endingRequested: true });
}

function setActionsDisabled(disabled) {
  document.querySelectorAll('.choice').forEach(b => b.disabled = disabled);
  const btn = document.getElementById('free-action-btn');
  const inp = document.getElementById('free-action-input');
  if (btn) btn.disabled = disabled;
  if (inp) inp.disabled = disabled;
}

async function runTurn(actionText, actionMeta = {}) {
  const narrEl = document.getElementById('narrative');
  const choicesEl = document.getElementById('choices');
  hideError('game-error');
  narrEl.innerHTML = '<div class="loading">叙事生成中</div>';
  choicesEl.innerHTML = '';
  hideSceneImage();
  try {
    const result = await apiTurn(storyState, actionText, actionMeta);
    applyTurnResult(storyState, result, actionText, actionMeta);
    renderScene(result.narrative, result.choices, true);
    // 异步：场景配图 + 环境音
    triggerSceneImage(result.image_prompt);
    triggerAmbience(result.ambience);
  } catch (e) {
    console.error(e);
    showError('game-error', e.message || '调用失败');
    narrEl.textContent = storyState.currentScene || '';
    renderChoices(storyState.lastChoices || []);
    setActionsDisabled(false);
  }
}

function endGameEarly() {
  if (!storyState) return;
  if (!confirm('确定要放弃这个故事吗？将直接进入结局回顾页（AI 不会再生成新内容）。')) return;
  storyState.endingTriggered = true;
  storyState.currentScene = (storyState.currentScene || '') + '\n\n（你选择在这里告别这段故事。）';
  saveGame();
  goToEnding();
}

function goToEnding() {
  document.getElementById('page-game').style.display = 'none';
  document.getElementById('page-ending').style.display = '';
  document.getElementById('ending-narrative').textContent = storyState.currentScene || '';
  const ol = document.getElementById('ending-history');
  ol.innerHTML = '';
  for (const h of storyState.history) {
    const li = document.createElement('li');
    li.textContent = `第 ${h.turn} 回合：${h.summary}　→　选择：${h.choice}`;
    ol.appendChild(li);
  }
  // 结局淡出音乐
  if (_audioEl) {
    const fadeStart = _audioEl.volume;
    let v = fadeStart;
    const t = setInterval(() => {
      v -= 0.02;
      if (v <= 0 || !_audioEl) { clearInterval(t); stopAmbience(); _audioEl && (_audioEl.volume = fadeStart); return; }
      _audioEl.volume = v;
    }, 80);
  }
}

function restart() {
  localStorage.removeItem(STORAGE_KEY);
  storyState = null;
  stopAmbience();
  hideSceneImage();
  document.getElementById('theme-input').value = '';
  showHome();
}

/* ---------- 场景配图 ---------- */
let _imageReqSeq = 0;
function hideSceneImage() {
  const wrap = document.getElementById('scene-image-wrap');
  const img = document.getElementById('scene-image');
  wrap.classList.remove('show');
  img.classList.remove('loaded');
  img.src = '';
}
async function triggerSceneImage(imagePrompt) {
  if (!settings.imageEnabled || !imagePrompt) return;
  const wrap = document.getElementById('scene-image-wrap');
  const img = document.getElementById('scene-image');
  const loading = document.getElementById('scene-image-loading');
  wrap.classList.add('show');
  img.classList.remove('loaded');
  loading.classList.remove('hidden');

  const mySeq = ++_imageReqSeq;
  try {
    const url = await apiImage(imagePrompt);
    if (mySeq !== _imageReqSeq) return; // 玩家已经做了下一选择，丢弃这张
    if (storyState) {
      storyState.lastImageUrl = url;
      saveGame();
    }
    img.onload = () => {
      img.classList.add('loaded');
      loading.classList.add('hidden');
    };
    img.src = url;
  } catch (e) {
    if (mySeq !== _imageReqSeq) return;
    console.warn('图片生成失败:', e.message);
    wrap.classList.remove('show');
    loading.classList.add('hidden');
  }
}

/* ---------- 环境音 / BGM ---------- */
const AMBIENCE_TRACKS = {
  // 公共领域 / 免费可用的音频源（CDN 直链 mp3）
  calm:        'https://cdn.pixabay.com/audio/2022/03/15/audio_d8bb0c67e1.mp3',  // soft pad
  tense:       'https://cdn.pixabay.com/audio/2022/10/14/audio_872df97f0c.mp3',  // suspense
  mysterious:  'https://cdn.pixabay.com/audio/2022/08/02/audio_6d12fa0c66.mp3',  // mysterious
  ominous:     'https://cdn.pixabay.com/audio/2023/06/15/audio_1c1a7f1c72.mp3',  // dark drone
  battle:      'https://cdn.pixabay.com/audio/2022/01/18/audio_d0c6ff1f7d.mp3',  // intense
  romantic:    'https://cdn.pixabay.com/audio/2023/02/28/audio_1e8b4d40df.mp3',  // soft piano
  sad:         'https://cdn.pixabay.com/audio/2022/03/19/audio_bdf1ebf87f.mp3',  // melancholy
  triumphant:  'https://cdn.pixabay.com/audio/2022/03/15/audio_ca06fcb01d.mp3',  // uplifting
  city:        'https://cdn.pixabay.com/audio/2022/08/04/audio_18a45d2d8b.mp3',  // city ambience
  wild:        'https://cdn.pixabay.com/audio/2022/03/10/audio_1e2e9d1f7c.mp3',  // forest
  indoor:      'https://cdn.pixabay.com/audio/2022/03/10/audio_60ce4cb29d.mp3',  // tavern
  supernatural:'https://cdn.pixabay.com/audio/2023/01/30/audio_38bb3b6d22.mp3',  // ethereal
};
let _audioEl = null;
let _currentAmbience = null;
function triggerAmbience(ambience) {
  if (!settings.audioEnabled) {
    if (_audioEl) { _audioEl.pause(); _currentAmbience = null; }
    return;
  }
  const key = (ambience || '').toLowerCase();
  const url = AMBIENCE_TRACKS[key];
  if (!url) return;
  if (_currentAmbience === key && _audioEl && !_audioEl.paused) return; // 同氛围继续播
  if (!_audioEl) {
    _audioEl = new Audio();
    _audioEl.loop = true;
    _audioEl.volume = 0.25;
  }
  _audioEl.src = url;
  _audioEl.play().catch(err => {
    console.warn('环境音播放失败（浏览器可能要求先与页面互动）:', err.message);
  });
  _currentAmbience = key;
}
function stopAmbience() {
  if (_audioEl) { _audioEl.pause(); _audioEl.currentTime = 0; }
  _currentAmbience = null;
}

/* ---------- 工具 ---------- */
function showError(id, msg) {
  let el = document.getElementById(id);
  el.innerHTML = `<div class="error">${escapeHtml(msg)}</div>`;
}
function hideError(id) {
  document.getElementById(id).innerHTML = '';
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

/* ---------- 启动 ---------- */
// 自动迁移旧版 v1 存档（apiKey 单独存）→ settings 模块
(function migrate() {
  const legacy = localStorage.getItem('makeDecisions.apiKey');
  if (legacy && !settings.apiKey) {
    settings.apiKey = legacy;
    persistSettings();
    localStorage.removeItem('makeDecisions.apiKey');
  }
})();
showHome();
</script>
